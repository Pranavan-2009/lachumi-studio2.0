<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lachumi Studio</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

input,select,textarea{
width:80%;
padding:8px;
margin:5px;
}

button{
padding:10px;
background:orange;
border:none;
}

</style>
</head>

<body>

<h1>Lachumi Studio Booking</h1>

<form id="bookingForm">

<input id="bName" placeholder="Name" required><br>

<input id="bEmail" placeholder="Email"><br>

<input id="bPhone" placeholder="Phone"><br>

<select id="bService">

<option>Wedding</option>
<option>Studio</option>
<option>Outdoor</option>

</select><br>

<input id="bDate" type="date"><br>

<input id="bTime" type="time"><br>

<textarea id="bDetails"></textarea><br>

<button>Book</button>

</form>

<h3 id="ok"></h3>

<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault();

var booking={

name:bName.value,
email:bEmail.value,
phone:bPhone.value,
service:bService.value,
date:bDate.value,
time:bTime.value,
details:bDetails.value

};

var list=JSON.parse(localStorage.getItem("bookings")||"[]");

list.push(booking);

localStorage.setItem("bookings",JSON.stringify(list));

ok.innerText="Booking Saved";

this.reset();

});

</script>

</body>
</html>
